# Ferdinand — Zeabur-native docker-compose (default deploy path).
#
# This file is consumed by Zeabur's Docker build pipeline. It deliberately
# contains ONLY the `ferdinand` service: no Caddy, no host port binding, no
# named volume for TLS certs.
#
# Why? Zeabur's gateway pod owns 0.0.0.0:80/443 on every project VPS. A
# Caddy compose service can never bind those ports, which makes the older
# hybrid (Caddy + own scripts on Zeabur VPS) impossible. Zeabur instead
# terminates TLS, manages the LE cert, and routes the project's public
# domain to the EXPOSE-d container port (40001) on its own. See the
# "Zeabur Quick Start" section in deploy/README.md.
#
# For a non-Zeabur VPS where YOU own ports 80/443 and need to run your own
# TLS edge + basic_auth, use the preserved sibling file:
#
#   docker compose -f docker-compose.raw-vps.yml up -d
#
# Usage on Zeabur:
#   - Zeabur's UI builds from this file's `ferdinand` service automatically.
#   - Required env vars (FERDINAND_SESSION_KEY, ANKI_ADMIN_USERNAME, etc.) are
#     set via the Zeabur dashboard, NOT a `.env` file. The
#     `${VAR:?...}` interpolation below still works because Zeabur
#     materializes those vars into the build/runtime environment.
#   - Persistent storage for /data is provisioned through the dashboard
#     "Volumes" panel; see deploy/README.md.
#
# To wipe local state when running this compose file directly on a dev box:
#   docker compose down -v

services:
  ferdinand:
    build:
      context: .
      dockerfile: Dockerfile
    image: ferdinand:local
    container_name: ferdinand
    # Bind to 0.0.0.0 inside the container so Zeabur's gateway pod can reach
    # the EXPOSE-d 40001. The cookie session-key check in main.rs requires
    # FERDINAND_SESSION_KEY when bind is non-loopback, enforced via env below.
    environment:
      ANKI_BIND: "0.0.0.0"
      ANKI_SERVER_PORT: "40001"
      ANKI_USERS_DIR: /data/users
      ANKI_AUTH_DB: /data/auth.db
      RUST_LOG: "${RUST_LOG:-info,anki_server=debug}"
      # Required for non-loopback bind. Generate with:
      #   openssl rand -base64 64
      # Set in Zeabur dashboard, NOT in a .env file.
      FERDINAND_SESSION_KEY: "${FERDINAND_SESSION_KEY:?set in Zeabur dashboard (run openssl rand -base64 64)}"
      # Phase B2: only the named user can hit /api/admin/*. Empty / unset →
      # admin endpoints 403 for everyone.
      ANKI_ADMIN_USERNAME: "${ANKI_ADMIN_USERNAME:-}"
      # Optional: override apkg import size cap. Default is set in code.
      ANKI_IMPORT_MAX_BYTES: "${ANKI_IMPORT_MAX_BYTES:-}"
      # Optional: seed a single user on first boot (idempotent).
      FERDINAND_SEED_USER: "${FERDINAND_SEED_USER:-}"
      FERDINAND_SEED_PASSWORD: "${FERDINAND_SEED_PASSWORD:-}"
    volumes:
      - anki_data:/data
    # NOTE: deliberately no `ports:` block — Zeabur's gateway pod owns
    # 0.0.0.0:80/443 and routes inbound traffic to the container's EXPOSE-d
    # 40001 internally. Publishing host ports here would conflict with the
    # gateway and is unnecessary on Zeabur. The Dockerfile retains
    # `EXPOSE 40001` so the gateway can discover the upstream port.
    expose:
      - "40001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:40001/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  # The Anki collection + auth.db live here. On Zeabur, attach a persistent
  # volume to `/data` via the dashboard "Volumes" panel so it survives
  # redeploys. On a dev box this is a docker-managed local volume.
  anki_data:
    name: ferdinand_anki_data
