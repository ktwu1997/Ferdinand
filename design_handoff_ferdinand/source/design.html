<title>Ferdinand — UI redesign</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&family=Caveat:wght@400;500&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+Antique:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* CJK font stack — Klee One has full kana + Joyo Kanji.
       Traditional-Chinese-only chars fall back to LXGW WenKai TC (similar pen-printed feel). */
    --font-cjk: "Klee One", "LXGW WenKai TC", "Noto Serif TC", ui-serif, serif;

    /* Kraft cream — deeper than Claude */
    --bg:        oklch(90.5% 0.022 80);
    --bg-soft:   oklch(88% 0.024 80);
    --bg-deep:   oklch(85% 0.026 78);
    --paper:     oklch(94% 0.018 82);
    --ink:       oklch(22% 0.018 60);
    --ink-soft:  oklch(38% 0.018 60);
    --ink-mute:  oklch(52% 0.014 60);
    --rule:      oklch(72% 0.024 70);
    --rule-soft: oklch(80% 0.022 75);
    --accent:    oklch(34% 0.07 155);
    --accent-soft: oklch(80% 0.05 150);
    --warn:      oklch(50% 0.13 50);
    --due:       oklch(48% 0.13 32);
  }
  [data-theme="dark"] {
    --bg:        oklch(15.5% 0.012 60);
    --bg-soft:   oklch(18.5% 0.014 60);
    --bg-deep:   oklch(12% 0.01 60);
    --paper:    oklch(20% 0.014 62);
    --ink:       oklch(92% 0.012 78);
    --ink-soft:  oklch(72% 0.012 70);
    --ink-mute:  oklch(55% 0.012 70);
    --rule:      oklch(34% 0.014 62);
    --rule-soft: oklch(26% 0.012 62);
    --accent:    oklch(74% 0.10 152);
    --accent-soft: oklch(28% 0.05 150);
    --warn:      oklch(75% 0.13 60);
    --due:       oklch(72% 0.16 30);
  }

  html, body { margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    color: #e8e8e8;
    -webkit-font-smoothing: antialiased;
  }

  /* Theme scope used on every artboard root */
  .theme {
    background: var(--bg);
    color: var(--ink);
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    line-height: 1.5;
  }
  .theme * { box-sizing: border-box; }
  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; font-feature-settings: "ss02","zero","cv01"; }
  .hand { font-family: "Caveat", cursive; }

  /* Hand-drawn stroke baseline */
  .sketch { stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .sketch.thin { stroke-width: 1.2; }
  .sketch.thick { stroke-width: 2.1; }
  .sketch .fill-paper { fill: var(--paper); }
  .sketch .fill-bg { fill: var(--bg); }
  .sketch .fill-accent-soft { fill: var(--accent-soft); opacity: 0.35; }

  /* Subtle paper grain — extremely soft */
  .grain { position: relative; }
  .grain::before {
    content: "";
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, currentColor 0.4px, transparent 0.6px),
      radial-gradient(circle at 70% 80%, currentColor 0.3px, transparent 0.5px),
      radial-gradient(circle at 40% 60%, currentColor 0.3px, transparent 0.5px);
    background-size: 7px 7px, 11px 11px, 5px 5px;
    opacity: 0.035;
    color: var(--ink);
    mix-blend-mode: multiply;
  }
  [data-theme="dark"] .grain::before { mix-blend-mode: screen; opacity: 0.025; }
</style>
