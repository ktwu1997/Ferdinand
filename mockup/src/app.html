<!DOCTYPE html>
<html lang="zh-TW" data-theme="light" data-sveltekit-preload-data="hover">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <title>Anki · redesign</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <script>
            // Apply theme before first paint to avoid flash
            (function () {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const fromUrl = params.get("theme");
                    const stored = localStorage.getItem("theme");
                    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    const theme = fromUrl ?? stored ?? (prefersDark ? "dark" : "light");
                    document.documentElement.dataset.theme = theme;
                } catch (_) {}
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div id="app">%sveltekit.body%</div>
    </body>
</html>
