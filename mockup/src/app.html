<!DOCTYPE html>
<html lang="zh-TW" data-theme="light" data-sveltekit-preload-data="hover">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="color-scheme" content="light dark" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Ferdinand" />
        <meta name="theme-color" content="oklch(97% 0.012 85)" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="oklch(15% 0.008 75)" media="(prefers-color-scheme: dark)" />
        <meta name="format-detection" content="telephone=no" />
        <title>Ferdinand</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <script>
            // Apply theme before first paint to avoid flash
            (function () {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const fromUrl = params.get("theme");
                    let stored = localStorage.getItem("theme");
                    if (stored !== "light" && stored !== "dark" && stored !== "auto") stored = "auto";
                    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    const choice = fromUrl ?? stored;
                    const theme = choice === "auto" ? (prefersDark ? "dark" : "light") : choice;
                    document.documentElement.dataset.theme = theme;
                } catch (_) {}
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div id="app">%sveltekit.body%</div>
    </body>
</html>
