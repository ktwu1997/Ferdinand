<!DOCTYPE html>
<html lang="zh-TW" data-theme="light" data-sveltekit-preload-data="hover">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="color-scheme" content="light dark" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Ferdinand" />
        <!-- Match the sketch-skin --bg tokens from src/styles/tokens.css so the
             mobile browser chrome (iOS Safari / Android Chrome URL bar) blends
             with the page background instead of fighting it. -->
        <meta name="theme-color" content="oklch(90.5% 0.022 80)" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="oklch(15.5% 0.012 60)" media="(prefers-color-scheme: dark)" />
        <meta name="format-detection" content="telephone=no" />
        <title>Ferdinand</title>
        <!-- Speed up the @import font requests fired by src/styles/typography.css
             (Geist, JetBrains Mono, Klee One, LXGW WenKai TC, Noto Serif TC,
             Caveat). The stylesheet itself is bundled in via the CSS @import —
             no <link rel="stylesheet"> needed here. -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <script>
            // Apply theme before first paint to avoid flash
            (function () {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const fromUrl = params.get("theme");
                    let stored = localStorage.getItem("theme");
                    if (stored !== "light" && stored !== "dark" && stored !== "auto") stored = "auto";
                    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    const choice = fromUrl ?? stored;
                    const theme = choice === "auto" ? (prefersDark ? "dark" : "light") : choice;
                    document.documentElement.dataset.theme = theme;
                } catch (_) {}
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div id="app">%sveltekit.body%</div>
    </body>
</html>
